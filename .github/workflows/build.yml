name: Build Plugin

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build plugin
        run: mvn -B package

      - name: Upload jar to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.jar
