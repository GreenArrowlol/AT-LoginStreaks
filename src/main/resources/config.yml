prefix: "&8[&6LoginStreak&8]&r"

claim-interval-hours: 24

messages:
  streak-continue: "%prefix% &aYou've logged in for &e%days% &adays in a row!"
  streak-broken: "%prefix% &cYour streak was broken! Starting fresh."
  rewards-claimed: "%prefix% &aYou've claimed your daily rewards!"
  already-claimed: "%prefix% &cYou've already claimed your rewards today! Next claim in &e%time%&c."
  admin-test: "%prefix% &aGave day %days% rewards to %player%."
  admin-reset: "%prefix% &aReset %player%'s login streak."
  admin-check: "%prefix% &e%player%'s current streak: &6%days% days"

help:
  entries-per-page: 5
  header: "&6&l=== &e&lLoginStreak Help &6&l(&e%page%&6/&e%max%&6&l) &6&l==="
  command-format: "&e%command% &7- &f%description%"
  footer: "&7Use &e/loginstreak help %next% &7for next page"
  bottom-border: "&6&l================================"
  no-commands: "&cNo commands available."
  invalid-page: "&cInvalid page number. Use 1-%max%."

rewards:
  day-1:
    type: COMMAND
    commands:
      - "give %player% diamond 1"
    broadcast: false
    message: "%prefix% &aYou received &e1 Diamond &afor logging in!"

  day-3:
    type: COMMAND
    commands:
      - "give %player% emerald 5"
    broadcast: false
    message: "%prefix% &aYou received &e5 Emeralds &afor a 3-day streak!"

  day-7:
    type: COMMAND
    commands:
      - "give %player% diamond 5"
      - "eco give %player% 1000"
    broadcast: true
    broadcast-message: "%prefix% &e%player% &ahas reached a &e7-day &alogin streak!"
    message: "%prefix% &aYou received &e5 Diamonds &aand &e$1000 &afor a 7-day streak!"

  day-14:
    type: COMMAND
    commands:
      - "give %player% diamond 10"
      - "eco give %player% 2500"
    broadcast: true
    broadcast-message: "%prefix% &e%player% &ahas reached a &e14-day &alogin streak!"
    message: "%prefix% &aYou received &e10 Diamonds &aand &e$2500 &afor a 14-day streak!"

  day-30:
    type: COMMAND
    commands:
      - "give %player% diamond 32"
      - "eco give %player% 5000"
      - "give %player% nether_star 1"
    broadcast: true
    broadcast-message: "%prefix% &e%player% &ahas reached a &e30-day &alogin streak! &6&lAmazing!"
    message: "%prefix% &aYou received &e32 Diamonds&a, &e$5000&a, and &e1 Nether Star &afor a 30-day streak!"

  day-60:
    type: COMMAND
    commands:
      - "give %player% diamond 64"
      - "eco give %player% 10000"
      - "give %player% nether_star 3"
    broadcast: true
    broadcast-message: "%prefix% &e%player% &ahas reached a &e60-day &alogin streak! &6&lIncredible!"
    message: "%prefix% &aYou received &e64 Diamonds&a, &e$10000&a, and &e3 Nether Stars &afor a 60-day streak!"

  day-90:
    type: COMMAND
    commands:
      - "give %player% diamond_block 5"
      - "eco give %player% 25000"
      - "give %player% nether_star 5"
    broadcast: true
    broadcast-message: "%prefix% &e%player% &ahas reached a &e90-day &alogin streak! &6&lLEGENDARY!"
    message: "%prefix% &aYou received &e5 Diamond Blocks&a, &e$25000&a, and &e5 Nether Stars &afor a 90-day streak!"

  day-180:
    type: COMMAND
    commands:
      - "give %player% diamond_block 10"
      - "eco give %player% 50000"
      - "give %player% nether_star 10"
    broadcast: true
    broadcast-message: "%prefix% &e%player% &ahas reached a &e180-day &alogin streak! &6&lUNBELIEVABLE!"
    message: "%prefix% &aYou received &e10 Diamond Blocks&a, &e$50000&a, and &e10 Nether Stars &afor a 180-day streak!"

  day-365:
    type: COMMAND
    commands:
      - "give %player% diamond_block 32"
      - "eco give %player% 100000"
      - "give %player% nether_star 32"
      - "give %player% elytra 1"
    broadcast: true
    broadcast-message: "%prefix% &e%player% &ahas reached a &e365-day &alogin streak! &6&lA FULL YEAR!"
    message: "%prefix% &6&lCONGRATULATIONS! &aYou received &e32 Diamond Blocks&a, &e$100000&a, &e32 Nether Stars&a, and &e1 Elytra &afor a full year streak!"

reward-tiers:
  tier-1:
    day-range: "1-6"
    type: COMMAND
    commands:
      - "give %player% iron_ingot %days%"
    message: "%prefix% &aDaily reward: &e%days% Iron Ingots"

  tier-2:
    day-range: "7-13"
    type: COMMAND
    commands:
      - "give %player% gold_ingot %days%"
      - "eco give %player% %days%00"
    message: "%prefix% &aDaily reward: &e%days% Gold Ingots &aand &e$%days%00"

  tier-3:
    day-range: "14-29"
    type: COMMAND
    commands:
      - "give %player% diamond %days%"
      - "eco give %player% %days%00"
    message: "%prefix% &aDaily reward: &e%days% Diamonds &aand &e$%days%00"

  tier-4:
    day-range: "30-89"
    type: COMMAND
    commands:
      - "give %player% diamond %days%"
      - "eco give %player% %days%00"
      - "give %player% emerald 1"
    message: "%prefix% &aDaily reward: &e%days% Diamonds&a, &e$%days%00&a, and &e1 Emerald"

  tier-5:
    day-range: "90-179"
    type: COMMAND
    commands:
      - "give %player% diamond %days%"
      - "eco give %player% %days%00"
      - "give %player% emerald 2"
    message: "%prefix% &aDaily reward: &e%days% Diamonds&a, &e$%days%00&a, and &e2 Emeralds"

  tier-6:
    day-range: "180-364"
    type: COMMAND
    commands:
      - "give %player% diamond %days%"
      - "eco give %player% %days%00"
      - "give %player% emerald 3"
    message: "%prefix% &aDaily reward: &e%days% Diamonds&a, &e$%days%00&a, and &e3 Emeralds"

  tier-7:
    day-range: "365+"
    type: COMMAND
    commands:
      - "give %player% diamond_block 1"
      - "eco give %player% %days%00"
      - "give %player% emerald 5"
    message: "%prefix% &6&lVIP Daily Reward: &e1 Diamond Block&a, &e$%days%00&a, and &e5 Emeralds"