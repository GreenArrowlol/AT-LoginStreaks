name: LoginStreakRewards
version: 1.0.0
main: com.loginstreaks.LoginStreakRewards
api-version: '1.20'
author: zArrowTan
softdepend: [Vault, PlaceholderAPI]

commands:
  loginstreak:
    description: Login streak admin commands
    aliases: [lg, streak]
    permission: loginstreak.admin
    usage: /loginstreak <teststreak|reset|check> <player> [day]

permissions:
  loginstreak.admin:
    description: Access to admin commands
    default: op